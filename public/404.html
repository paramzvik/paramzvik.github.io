<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 · vikramvissamsetti.work</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #00ff41;
      --green-dim: #00c832;
      --green-faint: rgba(0,255,65,0.07);
      --amber: #ffb300;
      --red: #ff4444;
      --bg: #0a0a0a;
      --panel: #0f1a0f;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--green);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      overflow: hidden;
    }

    /* ── Matrix rain ──────────────────────────────────── */
    #matrix {
      position: fixed;
      inset: 0;
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Scanlines ────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.18) 2px,
        rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    /* ── CRT flicker ──────────────────────────────────── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
      z-index: 2;
      animation: flicker 0.1s infinite;
    }

    @keyframes flicker {
      0%,100% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.92; }
      94% { opacity: 1; }
      97% { opacity: 0.96; }
      98% { opacity: 1; }
    }

    /* ── Terminal window ──────────────────────────────── */
    .terminal {
      position: relative;
      z-index: 10;
      width: min(780px, calc(100vw - 32px));
      margin: 0 auto;
      top: 50%;
      transform: translateY(-50%);
      background: var(--panel);
      border: 1px solid rgba(0,255,65,0.25);
      border-radius: 10px;
      box-shadow:
        0 0 0 1px rgba(0,255,65,0.08),
        0 0 40px rgba(0,255,65,0.12),
        0 0 80px rgba(0,255,65,0.06),
        inset 0 0 60px rgba(0,255,65,0.02);
      overflow: hidden;
    }

    /* title bar */
    .titlebar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(0,255,65,0.05);
      border-bottom: 1px solid rgba(0,255,65,0.12);
    }
    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
    }
    .dot-r { background: #ff5f57; }
    .dot-y { background: #ffbd2e; }
    .dot-g { background: #28c840; }

    .titlebar-label {
      margin-left: auto;
      font-size: 11px;
      opacity: 0.45;
      letter-spacing: 0.08em;
    }

    /* body */
    .term-body {
      padding: 24px 28px 28px;
      min-height: 400px;
    }

    .line {
      line-height: 1.7;
      font-size: clamp(12px, 1.6vw, 14px);
      opacity: 0;
      animation: fadeIn 0s forwards;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    .prompt   { color: var(--green); }
    .cmd      { color: #fff; }
    .out      { color: rgba(0,255,65,0.75); }
    .err      { color: var(--red); }
    .warn     { color: var(--amber); }
    .info     { color: #5af; }
    .dim      { opacity: 0.4; }
    .bold     { font-weight: 700; }
    .big404   {
      font-size: clamp(56px, 14vw, 110px);
      font-weight: 700;
      line-height: 1;
      color: var(--green);
      text-shadow:
        0 0 20px rgba(0,255,65,0.6),
        0 0 60px rgba(0,255,65,0.3);
      letter-spacing: -2px;
    }

    /* blinking cursor */
    .cursor {
      display: inline-block;
      width: 9px;
      height: 1.1em;
      background: var(--green);
      vertical-align: text-bottom;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* progress bar */
    .progress-wrap {
      margin: 6px 0 2px;
      height: 6px;
      background: rgba(0,255,65,0.1);
      border-radius: 3px;
      overflow: hidden;
      width: 320px;
      max-width: 100%;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--green-dim), var(--green));
      border-radius: 3px;
      width: 0%;
      box-shadow: 0 0 8px var(--green);
      animation: fill 3.6s cubic-bezier(0.22,1,0.36,1) 2.4s forwards;
    }
    @keyframes fill { to { width: 100%; } }

    /* link */
    a.go-home {
      display: inline-block;
      margin-top: 6px;
      color: var(--green);
      text-decoration: none;
      border: 1px solid rgba(0,255,65,0.35);
      padding: 6px 18px;
      border-radius: 4px;
      font-size: 13px;
      letter-spacing: 0.06em;
      transition: background 0.2s, box-shadow 0.2s;
    }
    a.go-home:hover {
      background: rgba(0,255,65,0.1);
      box-shadow: 0 0 16px rgba(0,255,65,0.25);
    }

    .spacer { height: 12px; }
    .spacer-sm { height: 6px; }
  </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="terminal">
  <div class="titlebar">
    <span class="dot dot-r"></span>
    <span class="dot dot-y"></span>
    <span class="dot dot-g"></span>
    <span class="titlebar-label">bash — vikram@portfolio ~ — 80×24</span>
  </div>
  <div class="term-body" id="body"></div>
</div>

<script>
  /* ── Matrix rain ──────────────────────────────────────── */
  const canvas = document.getElementById('matrix')
  const ctx = canvas.getContext('2d')
  let cols, drops
  function initMatrix() {
    canvas.width = window.innerWidth
    canvas.height = window.innerHeight
    const fs = 14
    cols = Math.floor(canvas.width / fs)
    drops = Array(cols).fill(1)
  }
  function drawMatrix() {
    ctx.fillStyle = 'rgba(10,10,10,0.05)'
    ctx.fillRect(0, 0, canvas.width, canvas.height)
    ctx.fillStyle = '#00ff41'
    ctx.font = '14px JetBrains Mono, monospace'
    const chars = 'アイウエオカキクケコ01ABCDEF∑∆Ω∇∈⊕⊗λμπρσ{}[]<>/|\\;:=+-*&^%$#'
    drops.forEach((y, i) => {
      const ch = chars[Math.floor(Math.random() * chars.length)]
      ctx.fillText(ch, i * 14, y * 14)
      if (y * 14 > canvas.height && Math.random() > 0.975) drops[i] = 0
      drops[i]++
    })
  }
  initMatrix()
  setInterval(drawMatrix, 50)
  window.addEventListener('resize', initMatrix)

  /* ── Terminal typewriter ──────────────────────────────── */
  const body = document.getElementById('body')

  const lines = [
    { html: '<span class="prompt">vikram@portfolio:~$</span> <span class="cmd">curl -I https://vikramvissamsetti.work/this-path</span>', delay: 0 },
    { html: '<span class="out">HTTP/2 <span class="err bold">404</span> Not Found</span>', delay: 400 },
    { html: '<span class="out dim">x-github-request-id: F3A0:1D2B:404</span>', delay: 520 },
    { html: '<span class="spacer"></span>', delay: 700 },
    { html: '<span class="big404">404</span>', delay: 800 },
    { html: '<span class="spacer-sm"></span>', delay: 900 },
    { html: '<span class="warn">⚠  Route not found in this deployment.</span>', delay: 1050 },
    { html: '<span class="spacer-sm"></span>', delay: 1200 },
    { html: '<span class="prompt">vikram@portfolio:~$</span> <span class="cmd">git log --oneline -1</span>', delay: 1400 },
    { html: '<span class="out"><span class="info">b20c95f</span> Rebuild portfolio: React + Vite, dark mode, sticky header</span>', delay: 1750 },
    { html: '<span class="spacer-sm"></span>', delay: 1900 },
    { html: '<span class="prompt">vikram@portfolio:~$</span> <span class="cmd">gh run list --limit 1</span>', delay: 2050 },
    { html: '<span class="out">STATUS  WORKFLOW          BRANCH  DURATION</span>', delay: 2350 },
    { html: '<span class="out"><span class="warn">●</span>  <span class="info">Deploy Portfolio</span>   main    in progress…</span>', delay: 2450 },
    { html: '<span class="spacer-sm"></span>', delay: 2600 },
    { html: '<span class="out dim">Deploying build artifacts to gh-pages…</span>', delay: 2700 },
    { html: '<div class="progress-wrap"><div class="progress-bar"></div></div>', delay: 2800 },
    { html: '<span class="spacer"></span>', delay: 3000 },
    { html: '<span class="prompt">vikram@portfolio:~$</span> <span class="cmd">cd /</span> <span class="dim"># go back home</span>', delay: 6400 },
    { html: '<a class="go-home" href="/">→ Take me to the portfolio</a>', delay: 6800 },
    { html: '<span class="spacer-sm"></span>', delay: 7000 },
    { html: '<span class="prompt">vikram@portfolio:~$</span> <span class="cursor"></span>', delay: 7200 },
  ]

  lines.forEach(({ html, delay }) => {
    setTimeout(() => {
      const el = document.createElement('div')
      el.className = 'line'
      el.innerHTML = html
      el.style.animationDuration = '0s'
      body.appendChild(el)
    }, delay)
  })
</script>
</body>
</html>
